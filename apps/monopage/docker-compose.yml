services:
  monopage-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: monopage-app
    ports:
      - "4111:3000"
    restart: unless-stopped
    environment:
      - BACKEND_URL=http://172.17.0.1:4110
    networks:
      - npm_default
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  npm_default:
    external: true
