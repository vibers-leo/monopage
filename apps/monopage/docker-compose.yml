services:
  monopage-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: monopage-app
    ports:
      - "4111:3000"
    restart: unless-stopped
    networks:
      - npm_default
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  npm_default:
    external: true
