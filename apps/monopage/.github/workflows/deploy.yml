name: Deploy to NCP

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.NCP_HOST }}
          username: ${{ secrets.NCP_USER }}
          key: ${{ secrets.NCP_SSH_KEY }}
          command_timeout: 15m
          script: |
            set -e
            cd /root/projects/monopage
            git stash 2>/dev/null || true
            git pull origin main
            cd apps/monopage
            docker compose up -d --build
            sleep 15
            curl -sf http://localhost:4111 || (echo "❌ 헬스체크 실패" && exit 1)
            docker exec npm-app-1 nginx -s reload || true
            echo "✅ monopage 배포 완료: $(date)"
